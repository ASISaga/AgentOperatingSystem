name: Update Submodules

on:
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule to update (leave blank for all)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-submodules:
    name: Update submodule references
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Update submodules
        run: |
          if [ -n "${{ github.event.inputs.submodule }}" ]; then
            git submodule update --remote "${{ github.event.inputs.submodule }}"
          else
            git submodule update --remote
          fi

      - name: Commit updated submodule references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || \
            git commit -am "chore: update submodule references" && git push
